[build]
  command = "npm run build"

[build.environment]
  NODE_ENV = "production"
  NPM_FLAGS = "--include=dev"

# Proxy all API routes to Cloud Run backend
[[redirects]]
  from = "/api/*"
  to = "https://mededuai-backend-3js7mh5u5a-uc.a.run.app/api/:splat"
  status = 200
  force = true


[[plugins]]
  package = "@netlify/plugin-nextjs"
