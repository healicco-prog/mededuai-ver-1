[build]
  command = "npm run build"

[build.environment]
  NODE_ENV = "production"
  NPM_FLAGS = "--include=dev"

# Proxy all API routes to Cloud Run backend (Hard redirect at CDN level)
[[redirects]]
  from = "/api/*"
  to = "https://mededuai-backend-945029424967.us-central1.run.app/api/:splat"
  status = 200
  force = true

[[plugins]]
  package = "@netlify/plugin-nextjs"
